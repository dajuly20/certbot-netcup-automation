# Certificate renewal settings
renewal:
  # Renew certificates when they have less than this many days until expiry
  # Default: 30 (Let's Encrypt recommends renewing at 30 days)
  renew_days_before: 10

  # DNS propagation timeout (in seconds)
  # How long to wait for DNS changes to propagate before validating
  # Default: 1800 (30 minutes) - works for most domains
  dns_propagation_timeout: 1800

  # Email for Let's Encrypt notifications
  email: julian@wiche.eu

  # Use Let's Encrypt staging server (for testing)
  # Set to true for testing, false for production certificates
  staging: false

# Systemd timer configuration
systemd:
  # When to run automatic renewal checks
  # Examples: "03:30" (daily at 3:30 AM), "Mon 02:00" (Mondays at 2 AM), "*:0/15" (every 15 minutes)
  # See: man systemd.time for more formats
  schedule: "03:30"

# File paths
paths:
  # Netcup API credentials file location
  # (TODO: replace with .env file? ) 
  credentials: /var/lib/letsencrypt/netcup_credentials.ini

  # Log file location
  log: /var/log/certbot-netcup.log

  # Lock file to prevent concurrent runs
  lock: /var/run/certbot-netcup.lock

  # Domains configuration file
  domains: domains.conf

# Docker settings
docker:
  # Docker image to use for certbot
  image: coldfix/certbot-dns-netcup

# Apache settings
apache:
  # Apache reload commands (tried in order)
  reload_commands:
    - systemctl reload apache2
    - service apache2 reload
    - apachectl graceful

# Remote hosts to sync certificates to
remote_hosts:
  # Enable/disable certificate syncing to remote hosts
  enabled: false

  # List of remote hosts to sync certificates to
  # Requires passwordless root SSH access (use: ssh-copy-id root@hostname)
  hosts:
    # - hostname: example.com
    #   user: root
    #
    # - hostname: 192.168.1.100
    #   user: root

  # Sync settings
  sync:
    # Path to sync (source on this host)
    source_path: /etc/letsencrypt/

    # Path to sync to (destination on remote hosts)
    destination_path: /etc/letsencrypt/

    # Rsync options
    rsync_options: "-avz --delete"

    # Reload Apache on remote hosts after sync
    reload_remote_apache: true
